# Настройки спавна вулкана
spawn:
  static: false
  # Координаты используются, только если static: true
  world: "world"
  x: 100
  y: 70
  z: 100

# Тайминги (в секундах)
times:
  delay: 7200     # Время между вулканами (2 часа = 7200 сек)
  open: 120       # Время подготовки до извержения
  eruption: 30    # Длительность самого извержения (выброс лута)
  close: 60       # Время остывания (после извержения до удаления)

# Флаги для региона вулкана (WorldGuard)
region:
  build: deny     # Разрешить (allow) или запретить (deny) строительство
  pvp: allow      # Разрешить (allow) или запретить (deny) PvP

# Путь к схематике вулкана
schematic: "plugins/WorldEdit/schematics/vulcan.schem"

# Настройки Босс-бара
bossbar:
  waiting:
    title: "&eДо извержения: &f{time}"
    color: "YELLOW"
  erupting:
    title: "&6&lВулкан извергается: &f{time}"
    color: "RED"
  cooling:
    title: "&7Вулкан пропадет через: &f{time}"
    color: "WHITE"

# Сообщения плагина
messages:
  prefix: "&6[SKVulcan] "
  spawned: "&fВулкан появился на &eX:{x} Z:{z}!"
  tp_success: "&aВы телепортированы к вулкану!"
  tp_fail: "&cВулкан сейчас не активен."
  gui_title: "&0Настройка лута SKVulcan"
  ask_repeats: "&bВведите СКОЛЬКО РАЗ выкидывать предмет:"
  ask_amount: "&eВведите количество в стаке (1-64):"
  saved: "&aНастройка сохранена!"
  error_number: "&cОшибка: введите целое число!"
  no_perms: "&cУ вас нет прав!"
  delay_info: "&eДо появления следующего вулкана осталось: &f{time}"
  delay_active: "&6Ивент уже заспавнился! Координаты: &e{x} {y} {z}"
  delay_set: "&aВремя до появления вулкана установлено на {time} сек."